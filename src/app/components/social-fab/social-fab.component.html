<div class="fixed bottom-6 right-6 md:bottom-8 md:right-8 z-50 flex flex-col items-center gap-4"
     (mouseenter)="onMouseEnter()"
     (mouseleave)="onMouseLeave()">
  
  <!-- Menü Öğeleri -->
  <div class="flex flex-col gap-3 transition-all duration-500 ease-out"
       [ngClass]="isOpen ? 'translate-y-0 opacity-100 pointer-events-auto' : 'translate-y-10 opacity-0 pointer-events-none'">
    
    <!-- WhatsApp (Phone ikonu) -->
    <a href="https://wa.me/905321234567" target="_blank" rel="noopener noreferrer" 
       title="WhatsApp"
       (click)="$event.stopPropagation()"
       class="w-12 h-12 rounded-full bg-[#25D366]/10 backdrop-blur-md border border-[#25D366]/30 flex items-center justify-center text-[#25D366] hover:bg-[#25D366] hover:text-white hover:border-[#25D366] transition-all duration-300 shadow-lg hover:scale-110">
      <lucide-icon name="phone" class="w-5 h-5"></lucide-icon>
    </a>

    <!-- YouTube -->
    <a href="#" target="_blank" rel="noopener noreferrer" 
       title="YouTube"
       (click)="$event.stopPropagation()"
       class="w-12 h-12 rounded-full bg-[#FF0000]/10 backdrop-blur-md border border-[#FF0000]/30 flex items-center justify-center text-[#FF0000] hover:bg-[#FF0000] hover:text-white hover:border-[#FF0000] transition-all duration-300 shadow-lg hover:scale-110">
      <lucide-icon name="youtube" class="w-5 h-5"></lucide-icon>
    </a>
    
    <!-- Instagram -->
    <a href="https://www.instagram.com/beeses.audio?igsh=MTU2bGR3bWd5MnJsdQ%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" 
       title="Instagram"
       (click)="$event.stopPropagation()"
       class="w-12 h-12 rounded-full bg-[#E1306C]/10 backdrop-blur-md border border-[#E1306C]/30 flex items-center justify-center text-[#E1306C] hover:bg-gradient-to-tr hover:from-[#f09433] hover:via-[#e6683c] hover:to-[#bc1888] hover:text-white hover:border-transparent transition-all duration-300 shadow-lg hover:scale-110">
      <lucide-icon name="instagram" class="w-5 h-5"></lucide-icon>
    </a>
    
    <!-- Facebook -->
    <a href="https://www.facebook.com/share/1DWuneXLUK/?mibextid=wwXlfr" target="_blank" rel="noopener noreferrer" 
       title="Facebook"
       (click)="$event.stopPropagation()"
       class="w-12 h-12 rounded-full bg-[#1877F2]/10 backdrop-blur-md border border-[#1877F2]/30 flex items-center justify-center text-[#1877F2] hover:bg-[#1877F2] hover:text-white hover:border-[#1877F2] transition-all duration-300 shadow-lg hover:scale-110">
      <lucide-icon name="facebook" class="w-5 h-5"></lucide-icon>
    </a>

  </div>

  <!-- Ana Buton (Trigger) -->
  <button (click)="toggleMenu($event)"
          class="relative w-14 h-14 rounded-full border border-beeses-gold/50 flex items-center justify-center text-white shadow-[0_0_20px_rgba(212,175,55,0.4)] transition-all duration-500 z-[60] cursor-pointer"
          [ngClass]="isOpen ? 'bg-beeses-dark border-beeses-gold' : 'bg-beeses-gold'">
    
    <!-- Bildirim Rozeti (Badge) -->
    <div class="absolute -top-1 -right-1 w-5 h-5 bg-red-600 rounded-full flex items-center justify-center text-white text-[11px] font-bold border-2 border-beeses-dark z-20 transition-all duration-300 shadow-sm"
         [ngClass]="isOpen ? 'scale-0 opacity-0' : 'scale-100 opacity-100'">
      4
    </div>

    <div class="relative w-6 h-6 flex items-center justify-center pointer-events-none">
      <lucide-icon name="layout-grid" class="w-6 h-6 absolute transition-all duration-500 transform"
                  [ngClass]="isOpen ? 'rotate-90 scale-0 opacity-0' : 'rotate-0 scale-100 opacity-100'"></lucide-icon>
      <lucide-icon name="x" class="w-6 h-6 absolute transition-all duration-500 transform text-beeses-gold"
                  [ngClass]="isOpen ? 'rotate-0 scale-100 opacity-100' : '-rotate-90 scale-0 opacity-0'"></lucide-icon>
    </div>
  </button>
  
</div>

<!-- Menü dışına tıklandığında kapanması için overlay -->
<div *ngIf="isOpen" class="fixed inset-0 z-40 bg-black/0" (click)="closeMenu()"></div>
