<div *ngIf="alert" 
     @slideInOut
     class="fixed top-24 right-4 z-[9999] min-w-[300px] shadow-2xl rounded-xl overflow-hidden backdrop-blur-md border border-white/10"
     [ngClass]="{'bg-green-600/90': alert.type === 'success', 'bg-red-600/90': alert.type === 'error'}">
  
  <div class="p-4 flex items-start gap-3">
    <div class="shrink-0 mt-0.5 text-white">
      <lucide-icon *ngIf="alert.type === 'success'" name="shield-check" class="w-6 h-6"></lucide-icon>
      <lucide-icon *ngIf="alert.type === 'error'" name="x" class="w-6 h-6"></lucide-icon>
    </div>
    
    <div class="flex-1">
      <h3 class="text-sm font-bold text-white">
        {{ alert.type === 'success' ? 'Başarılı' : 'Hata' }}
      </h3>
      <p class="mt-1 text-sm text-white/90">
        {{ alert.message }}
      </p>
    </div>
    
    <button (click)="close()" class="shrink-0 text-white/60 hover:text-white transition-colors">
      <lucide-icon name="x" class="w-4 h-4"></lucide-icon>
    </button>
  </div>
  
  <div class="h-1 w-full bg-black/20">
    <div class="h-full bg-white/50 animate-shrink"></div>
  </div>
</div>
