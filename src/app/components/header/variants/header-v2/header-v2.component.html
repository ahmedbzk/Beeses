<header class="fixed top-0 left-0 w-full z-[9999] transition-all duration-700">
  
  <!-- Dil Çubuğu -->
  <div [ngClass]="isScrolled ? 'max-h-0 opacity-0 invisible' : 'max-h-10 opacity-100 py-2 visible'"
    class="relative z-[120] bg-transparent transition-all duration-700 overflow-visible flex items-center justify-end">
    <div class="container mx-auto px-12 flex justify-end">
        <div class="relative group/lang pointer-events-auto">
            <button (click)="toggleLangDropdown()" class="flex items-center gap-2 text-[10px] font-bold text-gray-500 hover:text-beeses-gold transition tracking-widest uppercase outline-none cursor-pointer">
                <img [src]="currentLang.flag" class="w-4 h-auto rounded-sm shadow-sm">
                {{ currentLang.code }}
                <lucide-icon name="chevron-down" class="w-3 h-3 text-beeses-gold"></lucide-icon>
            </button>

            <div [ngClass]="{'opacity-100 visible translate-y-0': isLangDropdownOpen, 'opacity-0 invisible -translate-y-2': !isLangDropdownOpen}"
              class="absolute right-0 mt-2 w-32 bg-white border border-gray-100 shadow-2xl rounded-lg overflow-hidden z-[130] transition-all duration-300">
              <button *ngFor="let lang of languages" (click)="changeLang(lang)"
                class="flex w-full items-center gap-3 px-4 py-3 hover:bg-gray-50 transition text-[10px] text-gray-800 font-bold border-b border-gray-50 last:border-0 leading-none cursor-pointer">
                <img [src]="lang.flag" class="w-4 h-auto">
                <span>{{ lang.name }}</span>
              </button>
            </div>
        </div>
    </div>
  </div>

  <div [ngClass]="isScrolled ? 'bg-white/95 backdrop-blur-md shadow-lg py-3' : 'bg-white py-6'"
       class="relative z-[100] transition-all duration-700 ease-in-out">
    <div class="container mx-auto px-4 md:px-12 flex items-center justify-between">
      
      <nav class="hidden lg:flex items-center gap-8 flex-1 text-[11px] font-black tracking-widest text-gray-800 uppercase">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="v2-link cursor-pointer">ANA SAYFA</a>
        <div class="relative group/v2 py-2 cursor-pointer">
            <span class="v2-link flex items-center gap-1">KURUMSAL <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-gray-800"></lucide-icon></span>
            <div class="v2-dropdown">
                <a routerLink="/corporate/components/about" class="cursor-pointer">Hakkımızda</a>
                <a routerLink="/corporate/components/certificates" class="cursor-pointer">Sertifikalar</a>
                <a routerLink="/corporate/components/sss" class="cursor-pointer">S.S.S</a>
            </div>
        </div>
        <div class="relative group/v2 py-2 cursor-pointer">
            <span class="v2-link flex items-center gap-1">ÜRÜNLERİMİZ <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-gray-800"></lucide-icon></span>
            <div class="v2-dropdown">
                <a routerLink="/products" [queryParams]="{ category: 'SQL SERİSİ' }" class="cursor-pointer">SQL SERİSİ</a>
                <a routerLink="/products" [queryParams]="{ category: 'OF SERİSİ' }" class="cursor-pointer">OF SERİSİ</a>
                <a routerLink="/products" [queryParams]="{ category: 'PETEK SERİSİ' }" class="cursor-pointer">PETEK SERİSİ</a>
                <a routerLink="/products/innovation" class="text-beeses-gold cursor-pointer">İNOVASYON</a>
            </div>
        </div>
      </nav>

      <div class="flex-shrink-0 px-8">
        <a routerLink="/" class="block group cursor-pointer">
          <img src="assets/logo_lacivert.png" alt="Beeses Audio" 
               [ngClass]="isScrolled ? 'h-10' : 'h-14'"
               class="w-auto transition-all duration-700 ease-in-out transform group-hover:scale-105">
        </a>
      </div>

      <nav class="hidden lg:flex items-center justify-end gap-8 flex-1 text-[11px] font-black tracking-widest text-gray-800 uppercase">
        <a routerLink="/distributors" routerLinkActive="active" class="v2-link cursor-pointer">DİSTRİBÜTÖRLERİMİZ</a>
        <a routerLink="/contact" routerLinkActive="active" class="v2-link cursor-pointer">BİZE ULAŞIN</a>
        <a href="mailto:info@iotek.com.tr" class="flex items-center gap-2 ml-4 px-6 py-2.5 bg-beeses-gold text-white rounded-full hover:bg-gray-900 transition-all duration-500 shadow-md shadow-beeses-gold/20 cursor-pointer">
            <lucide-icon name="mail" class="w-4 h-4"></lucide-icon>
            <span class="text-[10px] font-black uppercase">İLETİŞİME GEÇ</span>
        </a>
      </nav>
    </div>
  </div>
</header>
