<header class="fixed top-0 left-0 w-full z-[9999] transition-all duration-700 uppercase tracking-[0.15em] font-bold">
  
  <!-- Dil Çubuğu -->
  <div [ngClass]="isScrolled ? 'max-h-0 opacity-0 invisible' : 'max-h-10 opacity-100 py-2 visible'"
    class="relative z-[120] bg-transparent transition-all duration-700 overflow-visible flex items-center justify-end">
    <div class="container mx-auto px-4 md:px-8 lg:px-12 h-full flex items-center justify-end">
      <div class="relative group/lang pointer-events-auto">
        <button (click)="toggleLangDropdown()"
          class="flex items-center gap-2 text-black hover:text-beeses-gold transition text-[10px] font-bold outline-none uppercase tracking-widest cursor-pointer">
          <img [src]="currentLang.flag" class="w-4 h-auto rounded-sm shadow-sm">
          <span>{{ currentLang.code }}</span>
          <lucide-icon name="chevron-down" class="w-3 h-3 text-black"></lucide-icon>
        </button>

        <div [ngClass]="{'opacity-100 visible translate-y-0': isLangDropdownOpen, 'opacity-0 invisible -translate-y-2': !isLangDropdownOpen}"
          class="absolute right-0 mt-2 w-32 bg-white border border-gray-100 shadow-2xl rounded-lg overflow-hidden z-[130] transition-all duration-300">
          <button *ngFor="let lang of languages" (click)="changeLang(lang)"
            class="flex w-full items-center gap-3 px-4 py-3 hover:bg-gray-50 transition text-[10px] text-gray-800 font-bold border-b border-gray-50 last:border-0 leading-none cursor-pointer">
            <img [src]="lang.flag" class="w-4 h-auto">
            <span>{{ lang.name }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Ana Header -->
  <div [ngClass]="isScrolled ? 'bg-beeses-gold/95 backdrop-blur-lg shadow-xl py-3' : 'bg-beeses-gold py-6'"
    class="relative z-[100] transition-all duration-700 ease-in-out">
    <div class="container mx-auto px-4 md:px-8 lg:px-12 flex items-center justify-between">
      <a routerLink="/" class="flex items-center flex-shrink-0 group cursor-pointer">
        <img src="assets/logo_siyah.png" alt="Beeses Audio" 
             [ngClass]="isScrolled ? 'h-10 md:h-11' : 'h-12 md:h-14'"
             class="w-auto transition-all duration-700 ease-in-out group-hover:scale-105">
      </a>

      <nav class="hidden lg:flex items-center gap-6 md:gap-10 text-[11px] md:text-xs">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="hover:text-white transition-colors duration-300 cursor-pointer">ANA SAYFA</a>
        
        <div class="relative group/dropdown py-2 cursor-pointer">
            <span class="flex items-center gap-1 hover:text-white transition-colors duration-300">
                KURUMSAL <lucide-icon name="chevron-down" class="w-3 h-3 text-black opacity-50"></lucide-icon>
            </span>
            <div class="absolute top-full left-0 mt-0 w-48 bg-white shadow-2xl border-t-2 border-beeses-gold opacity-0 invisible group-hover/dropdown:opacity-100 group-hover/dropdown:visible transition-all duration-300 z-[110] py-2">
                <a routerLink="/corporate/components/about" class="block px-6 py-3 text-black hover:bg-beeses-gold hover:text-white transition-all text-[10px] cursor-pointer">HAKKIMIZDA</a>
                <a routerLink="/corporate/components/certificates" class="block px-6 py-3 text-black hover:bg-beeses-gold hover:text-white transition-all text-[10px] cursor-pointer">SERTİFİKALAR</a>
                <a routerLink="/corporate/components/sss" class="block px-6 py-3 text-black hover:bg-beeses-gold hover:text-white transition-all text-[10px] cursor-pointer">S.S.S</a>
            </div>
        </div>

        <div class="relative group/dropdown py-2 cursor-pointer">
            <span class="flex items-center gap-1 hover:text-white transition-colors duration-300">
                ÜRÜNLERİMİZ <lucide-icon name="chevron-down" class="w-3 h-3 text-black opacity-50"></lucide-icon>
            </span>
            <div class="absolute top-full left-0 mt-0 w-48 bg-white shadow-2xl border-t-2 border-beeses-gold opacity-0 invisible group-hover/dropdown:opacity-100 group-hover/dropdown:visible transition-all duration-300 z-[110] py-2">
                <a routerLink="/products" [queryParams]="{ category: 'SQL SERİSİ' }" class="block px-6 py-3 text-black hover:bg-beeses-gold hover:text-white transition-all text-[10px] cursor-pointer">SQL SERİSİ</a>
                <a routerLink="/products" [queryParams]="{ category: 'OF SERİSİ' }" class="block px-6 py-3 text-black hover:bg-beeses-gold hover:text-white transition-all text-[10px] cursor-pointer">OF SERİSİ</a>
                <a routerLink="/products" [queryParams]="{ category: 'PETEK SERİSİ' }" class="block px-6 py-3 text-black hover:bg-beeses-gold hover:text-white transition-all text-[10px] cursor-pointer">PETEK SERİSİ</a>
                <div class="h-px bg-gray-100 my-1"></div>
                <a routerLink="/products/innovation" class="block px-6 py-3 text-beeses-gold hover:bg-beeses-gold hover:text-white transition-all text-[10px] font-black cursor-pointer">İNOVASYON</a>
            </div>
        </div>

        <a routerLink="/distributors" class="hover:text-white transition-colors duration-300 cursor-pointer">DİSTRİBÜTÖRLERİMİZ</a>
        <a routerLink="/contact" class="hover:text-white transition-colors duration-300 cursor-pointer">BİZE ULAŞIN</a>
        
        <a href="mailto:info@iotek.com.tr" class="flex items-center gap-2 ml-4 px-6 py-3 bg-black text-white rounded-full hover:bg-white hover:text-black transition-all duration-500 shadow-xl shadow-black/20 cursor-pointer">
            <lucide-icon name="mail" class="w-4 h-4 text-beeses-gold"></lucide-icon>
            <span class="text-[10px] font-black tracking-widest uppercase">İLETİŞİME GEÇ</span>
        </a>
      </nav>
    </div>
  </div>
</header>
