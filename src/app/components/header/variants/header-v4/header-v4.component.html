<div class="fixed top-0 left-0 w-full z-[9999] transition-all duration-700 ease-in-out px-4 md:px-10 pt-2 md:pt-4 pointer-events-none">
  
  <!-- Dil Çubuğu -->
  <div [ngClass]="isScrolled ? 'max-h-0 opacity-0 invisible' : 'max-h-10 opacity-100 mb-2 visible'"
    class="relative z-[120] bg-transparent transition-all duration-700 overflow-visible flex items-center justify-end pointer-events-auto pr-8">
      <div class="relative group/lang">
        <button (click)="toggleLangDropdown()"
          class="flex items-center gap-2 text-white/60 hover:text-white transition text-[10px] font-bold outline-none uppercase tracking-widest cursor-pointer">
          <img [src]="currentLang.flag" class="w-4 h-auto rounded-sm">
          <span>{{ currentLang.code }}</span>
          <lucide-icon name="chevron-down" class="w-3 h-3 text-beeses-gold"></lucide-icon>
        </button>

        <div [ngClass]="{'opacity-100 visible translate-y-0': isLangDropdownOpen, 'opacity-0 invisible -translate-y-2': !isLangDropdownOpen}"
          class="absolute right-0 mt-2 w-32 bg-black/90 backdrop-blur-xl border border-white/10 shadow-2xl rounded-lg overflow-hidden z-[130] transition-all duration-300">
          <button *ngFor="let lang of languages" (click)="changeLang(lang)"
            class="flex w-full items-center gap-3 px-4 py-3 hover:bg-white/10 transition text-[10px] text-white font-bold border-b border-white/5 last:border-0 leading-none cursor-pointer">
            <img [src]="lang.flag" class="w-4 h-auto">
            <span>{{ lang.name }}</span>
          </button>
        </div>
      </div>
  </div>

  <header [ngClass]="isScrolled ? 'w-full md:w-[95%] lg:w-[94%] mx-auto py-2.5 rounded-full translate-y-0 shadow-2xl bg-black/80' : 'w-full py-5 rounded-[40px] translate-y-2 bg-black/40'"
          class="backdrop-blur-3xl border border-white/10 transition-all duration-700 ease-in-out pointer-events-auto overflow-visible relative z-[100]">
    
    <div class="container mx-auto px-6 md:px-12 flex items-center justify-between">
      
      <!-- Logo -->
      <div class="flex-shrink-0 w-40">
        <a routerLink="/" class="group cursor-pointer">
          <img src="assets/logo_beyaz.png" alt="Beeses Audio" 
               [ngClass]="isScrolled ? 'h-11' : 'h-12'"
               class="w-auto object-contain transition-all duration-700 ease-in-out group-hover:scale-105">
        </a>
      </div>

      <!-- Nav -->
      <nav class="hidden lg:flex items-center gap-12 text-[11px] font-black tracking-[0.2em] text-white uppercase">
        <a routerLink="/" class="transition-all opacity-80 hover:opacity-100 whitespace-nowrap cursor-pointer">ANA SAYFA</a>
        
        <div class="relative group py-4 cursor-pointer">
            <span class="flex items-center gap-1 transition-all opacity-80 group-hover:opacity-100 whitespace-nowrap">
                KURUMSAL <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-beeses-gold"></lucide-icon>
            </span>
            <div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-56 bg-black/95 backdrop-blur-2xl border border-white/10 p-4 rounded-3xl opacity-0 invisible group-hover:opacity-100 group-hover:visible group-hover:translate-y-0 translate-y-4 transition-all duration-500 z-[9999] flex flex-col gap-1 shadow-2xl">
                <a routerLink="/corporate/components/about" class="block py-2.5 px-4 text-[10px] text-white/50 hover:text-white hover:bg-white/5 rounded-xl text-center transition-all cursor-pointer">HAKKIMIZDA</a>
                <a routerLink="/corporate/components/certificates" class="block py-2.5 px-4 text-[10px] text-white/50 hover:text-white hover:bg-white/5 rounded-xl text-center transition-all cursor-pointer">SERTİFİKALAR</a>
                <a routerLink="/corporate/components/sss" class="block py-2.5 px-4 text-[10px] text-white/50 hover:text-white hover:bg-white/5 rounded-xl text-center transition-all cursor-pointer">S.S.S</a>
            </div>
        </div>

        <div class="relative group py-4 cursor-pointer">
            <span class="flex items-center gap-1 transition-all opacity-80 group-hover:opacity-100 whitespace-nowrap">
                ÜRÜNLERİMİZ <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-beeses-gold"></lucide-icon>
            </span>
            <div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-56 bg-black/95 backdrop-blur-2xl border border-white/10 p-4 rounded-3xl opacity-0 invisible group-hover:opacity-100 group-hover:visible group-hover:translate-y-0 translate-y-4 transition-all duration-500 z-[9999] flex flex-col gap-1 shadow-2xl">
                <a routerLink="/products" [queryParams]="{ category: 'SQL SERİSİ' }" class="block py-2.5 px-4 text-[10px] text-white/50 hover:text-white hover:bg-white/5 rounded-xl text-center transition-all cursor-pointer">SQL SERİSİ</a>
                <a routerLink="/products" [queryParams]="{ category: 'OF SERİSİ' }" class="block py-2.5 px-4 text-[10px] text-white/50 hover:text-white hover:bg-white/5 rounded-xl text-center transition-all cursor-pointer">OF SERİSİ</a>
                <a routerLink="/products" [queryParams]="{ category: 'PETEK SERİSİ' }" class="block py-2.5 px-4 text-[10px] text-white/50 hover:text-white hover:bg-white/5 rounded-xl text-center transition-all cursor-pointer">PETEK SERİSİ</a>
                <a routerLink="/products/innovation" class="block py-2.5 px-4 text-[10px] text-beeses-gold font-black hover:bg-white/5 rounded-xl text-center transition-all cursor-pointer">İNOVASYON</a>
            </div>
        </div>

        <a routerLink="/distributors" class="transition-all opacity-80 hover:opacity-100 whitespace-nowrap cursor-pointer">DİSTRİBÜTÖRLERİMİZ</a>
        <a routerLink="/contact" class="transition-all opacity-80 hover:opacity-100 whitespace-nowrap cursor-pointer">BİZE ULAŞIN</a>
      </nav>

      <!-- Action -->
      <div class="flex items-center justify-end w-40">
        <a href="mailto:info@iotek.com.tr" class="flex items-center gap-2 px-5 py-2.5 bg-beeses-gold text-white rounded-full hover:bg-white hover:text-black transition-all duration-500 shadow-xl shadow-beeses-gold/20 cursor-pointer">
            <lucide-icon name="mail" class="w-4 h-4"></lucide-icon>
            <span class="text-[9px] font-black tracking-widest uppercase">İLETİŞİME GEÇ</span>
        </a>
      </div>

    </div>
  </header>
</div>
