<header class="fixed top-0 left-0 w-full z-[9999] transition-all duration-700 uppercase tracking-[0.15em] font-bold">
  
  <!-- Dil Çubuğu -->
  <div [ngClass]="isScrolled ? 'max-h-0 opacity-0 invisible' : 'max-h-10 opacity-100 py-2 visible'"
    class="relative z-[120] bg-transparent transition-all duration-700 overflow-visible flex items-center justify-end">
    <div class="container mx-auto px-4 md:px-12 h-full flex items-center justify-end">
      <div class="relative group/lang pointer-events-auto">
        <button (click)="toggleLangDropdown()"
          class="flex items-center gap-2 text-beeses-dark hover:text-beeses-gold transition text-[10px] font-bold outline-none uppercase tracking-widest cursor-pointer">
          <img [src]="currentLang.flag" class="w-4 h-auto rounded-sm shadow-sm">
          <span>{{ currentLang.code }}</span>
          <lucide-icon name="chevron-down" class="w-3 h-3 text-beeses-dark/70"></lucide-icon>
        </button>

        <div [ngClass]="{'opacity-100 visible': isLangDropdownOpen, 'opacity-0 invisible': !isLangDropdownOpen}"
          class="v5-lang-dropdown">
          <button *ngFor="let lang of languages" (click)="changeLang(lang)">
            <img [src]="lang.flag" class="w-4 h-auto">
            <span>{{ lang.name }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Ana Header (Creative & Dark Centered V4 - Matches V5 with Animated Search) -->
  <div [ngClass]="isScrolled ? 'bg-beeses-dark/95 backdrop-blur-lg shadow-xl py-4' : 'bg-beeses-dark py-6'"
    class="relative z-[100] transition-all duration-700 ease-in-out border-b border-white/5 flex items-center">
    <div class="container mx-auto px-4 md:px-12 flex items-center justify-between w-full">
      
      <!-- Left Menu -->
      <nav class="v4-nav-left hidden lg:flex items-center gap-10 flex-1 text-[11px] font-black tracking-widest uppercase"
           [ngClass]="{'search-active': isSearchActive}">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="v5-link-new cursor-pointer">ANA SAYFA</a>
          
          <div class="relative group/v5 flex items-center py-4 cursor-pointer">
              <span class="v5-link-new flex items-center gap-1.5">
                  KURUMSAL <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-white/55"></lucide-icon>
              </span>
              <div class="v5-dropdown-creative">
                  <a routerLink="/corporate/components/about" class="cursor-pointer">Hakkımızda</a>
                  <a routerLink="/corporate/components/news" class="cursor-pointer">Haberler & Duyurular</a>
                  <a routerLink="/corporate/components/certificates" class="cursor-pointer">Sertifikalar</a>
                  <a routerLink="/corporate/components/sss" class="cursor-pointer">S.S.S</a>
              </div>
          </div>

          <div class="relative group/v5 flex items-center py-4 cursor-pointer">
              <span class="v5-link-new flex items-center gap-1.5">
                  ÜRÜNLERİMİZ <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-white/55"></lucide-icon>
              </span>
              <div class="v5-dropdown-creative">
                  <a routerLink="/products" [queryParams]="{ category: 'SQL SERİSİ' }" class="cursor-pointer">SQL SERİSİ</a>
                  <a routerLink="/products" [queryParams]="{ category: 'OF SERİSİ' }" class="cursor-pointer">OF SERİSİ</a>
                  <a routerLink="/products" [queryParams]="{ category: 'PETEK SERİSİ' }" class="cursor-pointer">PETEK SERİSİ</a>
                  <div class="h-px bg-gray-100 my-2"></div>
                  <a routerLink="/products/innovation" class="text-beeses-gold cursor-pointer">İNOVASYON & GELECEK</a>
              </div>
          </div>
      </nav>

      <!-- Center Logo (Slides to the left when search is active) -->
      <div class="v4-logo-container flex-shrink-0 px-8"
           [ngClass]="{'search-active': isSearchActive}">
        <a routerLink="/" class="group cursor-pointer">
          <img src="assets/logo.png" alt="Beeses Audio" 
               [ngClass]="isScrolled ? 'h-[53px] md:h-[62px] logo-scrolled-glow' : 'h-[70px] md:h-[80px] logo-glow'"
               class="w-auto transition-all duration-700 ease-in-out">
        </a>
      </div>

      <!-- Right Menu (No Mail Button - Equalized with Search Button) -->
      <nav class="v4-nav-right hidden lg:flex items-center justify-end gap-10 flex-1 text-[11px] font-black tracking-widest uppercase"
           [ngClass]="{'search-active': isSearchActive}">
          <div class="v4-right-links flex items-center gap-10" [ngClass]="{'search-active': isSearchActive}">
              <a routerLink="/distributors" class="v5-link-new cursor-pointer">DİSTRİBÜTÖRLERİMİZ</a>
              
              <div class="relative group/v5 flex items-center py-4 cursor-pointer">
                  <span class="v5-link-new flex items-center gap-1.5">
                      BİZE ULAŞIN <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-white/55"></lucide-icon>
                  </span>
                  <div class="v5-dropdown-creative">
                      <a routerLink="/contact" class="cursor-pointer">Talep Formu</a>
                      <a routerLink="/contact/warranty-query" class="cursor-pointer">Garanti Sorgulama</a>
                      <a routerLink="/contact/warranty" class="cursor-pointer">Garanti Başvurusu</a>
                  </div>
              </div>
          </div>

          <!-- Arama Butonu (Symmetry Element - Expands dynamically to the left) -->
          <div class="v4-search-box" [ngClass]="{'search-active': isSearchActive}">
              <input type="text" 
                     placeholder="Ürün Ara..." 
                     [ngClass]="{'search-active': isSearchActive}"
                     class="search-input">
              <button (click)="toggleSearch()" class="search-btn">
                  <lucide-icon [name]="isSearchActive ? 'x' : 'search'" class="w-5 h-5"></lucide-icon>
              </button>
          </div>
      </nav>
    </div>
  </div>
</header>
