<header class="fixed top-0 left-0 w-full z-[9999] transition-all duration-700 uppercase tracking-[0.15em] font-bold">
  
  <!-- Dil Çubuğu -->
  <div [ngClass]="isScrolled ? 'max-h-0 opacity-0 invisible' : 'max-h-10 opacity-100 py-2 visible'"
    class="relative z-[120] bg-transparent transition-all duration-700 overflow-visible flex items-center justify-end">
    <div class="container mx-auto px-4 md:px-12 h-full flex items-center justify-end">
      <div class="relative group/lang pointer-events-auto">
        <button (click)="toggleLangDropdown()"
          class="flex items-center gap-2 text-black hover:text-white transition text-[10px] font-bold outline-none uppercase tracking-widest cursor-pointer">
          <img [src]="currentLang.flag" class="w-4 h-auto rounded-sm shadow-sm">
          <span>{{ currentLang.code }}</span>
          <lucide-icon name="chevron-down" class="w-3 h-3 text-black"></lucide-icon>
        </button>

        <div [ngClass]="{'opacity-100 visible translate-y-0': isLangDropdownOpen, 'opacity-0 invisible -translate-y-2': !isLangDropdownOpen}"
          class="absolute right-0 mt-2 w-32 bg-white border border-gray-100 shadow-2xl rounded-lg overflow-hidden z-[130] transition-all duration-300">
          <button *ngFor="let lang of languages" (click)="changeLang(lang)"
            class="flex w-full items-center gap-3 px-4 py-3 hover:bg-gray-50 transition text-[10px] text-gray-800 font-bold border-b border-gray-50 last:border-0 leading-none cursor-pointer">
            <img [src]="lang.flag" class="w-4 h-auto">
            <span>{{ lang.name }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Ana Header (Gold Centered) -->
  <div [ngClass]="isScrolled ? 'bg-beeses-gold/95 backdrop-blur-lg shadow-xl py-3' : 'bg-beeses-gold py-6'"
    class="relative z-[100] transition-all duration-700 ease-in-out border-b border-black/5 flex items-center">
    <div class="container mx-auto px-4 md:px-12 flex items-center justify-between w-full">
      
      <!-- Left Menu -->
      <nav class="hidden lg:flex items-center gap-10 flex-1 text-[11px] font-black tracking-widest text-black uppercase">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="v5-link-new cursor-pointer">ANA SAYFA</a>
          <div class="relative group flex items-center py-4 cursor-pointer">
              <span class="v5-link-new flex items-center gap-1.5">
                  KURUMSAL <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-black"></lucide-icon>
              </span>
              <div class="v5-dropdown-simple">
                  <a routerLink="/corporate/components/about" class="cursor-pointer">Hakkımızda</a>
                  <a routerLink="/corporate/components/certificates" class="cursor-pointer">Sertifikalar</a>
                  <a routerLink="/corporate/components/sss" class="cursor-pointer">S.S.S</a>
              </div>
          </div>
          <div class="relative group flex items-center py-4 cursor-pointer">
              <span class="v5-link-new flex items-center gap-1.5">
                  ÜRÜNLERİMİZ <lucide-icon name="chevron-down" class="w-3.5 h-3.5 text-black"></lucide-icon>
              </span>
              <div class="v5-dropdown-simple">
                  <a routerLink="/products" [queryParams]="{ category: 'SQL SERİSİ' }" class="cursor-pointer">SQL SERİSİ</a>
                  <a routerLink="/products" [queryParams]="{ category: 'OF SERİSİ' }" class="cursor-pointer">OF SERİSİ</a>
                  <a routerLink="/products" [queryParams]="{ category: 'PETEK SERİSİ' }" class="cursor-pointer">PETEK SERİSİ</a>
                  <a routerLink="/products/innovation" class="text-beeses-gold bg-black rounded px-2 py-0.5 mt-1 cursor-pointer">İNOVASYON</a>
              </div>
          </div>
      </nav>

      <!-- Center Logo -->
      <div class="flex-shrink-0 px-8">
        <a routerLink="/" class="group cursor-pointer">
          <img src="assets/logo_siyah.png" alt="Beeses Audio" 
               [ngClass]="isScrolled ? 'h-10' : 'h-16'"
               class="w-auto transition-all duration-700 ease-in-out group-hover:scale-105">
        </a>
      </div>

      <!-- Right Menu -->
      <nav class="hidden lg:flex items-center justify-end gap-10 flex-1 text-[11px] font-black tracking-widest text-black uppercase">
          <a routerLink="/distributors" class="v5-link-new cursor-pointer">DİSTRİBÜTÖRLERİMİZ</a>
          <a routerLink="/contact" class="v5-link-new cursor-pointer">BİZE ULAŞIN</a>
          <a href="mailto:info@iotek.com.tr" class="flex items-center gap-2 px-6 py-3 bg-black text-white rounded-full hover:bg-gray-800 transition-all duration-500 shadow-xl shadow-black/20 cursor-pointer">
              <lucide-icon name="mail" class="w-4 h-4 text-beeses-gold"></lucide-icon>
              <span class="text-[10px] font-black uppercase">İLETİŞİME GEÇ</span>
          </a>
      </nav>
    </div>
  </div>
</header>
