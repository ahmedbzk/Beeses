<section
  class="relative h-[75vh] md:h-screen w-full overflow-hidden bg-beeses-dark uppercase tracking-wider text-xs font-medium">

  <div class="slider-track" [style.transform]="'translateX(-' + (currentSlideIndex * 100) + '%)'">

    <div *ngFor="let slide of slides" class="slide-unit">
      <img [src]="slide.image" alt="Beeses" class="slide-img">

      <div class="absolute inset-0 z-10 bg-black/30"></div>
      <div class="absolute inset-0 z-10 bg-gradient-to-b from-black/40 via-transparent to-beeses-dark"></div>

      <div
        class="absolute z-20 p-6 md:p-12 rounded-2xl border border-white/5 bg-black/20 backdrop-blur-md flex flex-col gap-4 md:gap-6 max-w-2xl"
        [ngClass]="slide.position">

        <h3 class="text-beeses-gold text-[10px] md:text-xs font-light tracking-[0.4em]" [innerText]="slide.subtitle">
        </h3>
        <h1 class="text-beeses-silver text-3xl md:text-5xl lg:text-6xl font-light tracking-tighter leading-tight"
          [innerHTML]="slide.title"></h1>
        <p class="text-beeses-silver/70 text-xs md:text-sm font-light italic max-w-md" [innerText]="slide.description">
        </p>

        <div class="flex">
          <button
            class="group px-8 py-3 border border-beeses-gold/30 text-beeses-gold hover:bg-beeses-gold hover:text-white transition-all duration-500 rounded-full flex items-center gap-3 bg-white/5 backdrop-blur-sm">
            <span class="tracking-[0.1em] text-[10px]">KEŞFET</span>
            <lucide-icon name="arrow-right"
              class="w-4 h-4 group-hover:translate-x-2 transition-transform duration-300"></lucide-icon>
          </button>
        </div>
      </div>
    </div>

  </div>

  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-30 text-beeses-silver/20 animate-bounce">
    <lucide-icon name="chevron-down" class="w-6 h-6"></lucide-icon>
  </div>
</section>
