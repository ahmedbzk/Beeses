<section class="py-24 bg-[#F8F9FA] relative overflow-hidden">
  <!-- Arka Plan Efektleri -->
  <div class="absolute inset-0 z-0">
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-beeses-gold/10 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-beeses-gold/5 blur-[150px] rounded-full pointer-events-none"></div>
  </div>

  <div class="container mx-auto px-4 md:px-12 relative z-10">
    <!-- Section Header -->
    <div class="text-center mb-16">
      <h4 class="text-beeses-gold text-sm font-bold tracking-[0.3em] uppercase mb-4">Gelişmeler</h4>
      <h2 class="text-4xl md:text-5xl font-black text-black tracking-widest uppercase">HABERLER <span class="text-beeses-gold">&</span> DUYURULAR</h2>
      <div class="w-24 h-1 bg-beeses-gold mx-auto mt-6 rounded-full"></div>
    </div>

    <!-- News Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let item of newsItems; let i = index" 
           routerLink="/corporate/components/news"
           class="group relative bg-white border border-gray-200 rounded-2xl overflow-hidden hover:border-beeses-gold/50 transition-all duration-500 hover:-translate-y-2 cursor-pointer shadow-lg hover:shadow-2xl">
        
        <!-- Image Container -->
        <div class="relative h-64 overflow-hidden">
          <div class="absolute inset-0 bg-black/40 group-hover:bg-transparent transition-colors duration-500 z-10"></div>
          <img [src]="getImageUrl(item.image)" [alt]="item.title" 
               class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-in-out">
          
          <!-- Category Badge -->
          <div class="absolute top-4 left-4 z-20">
            <span class="px-4 py-1.5 bg-beeses-gold text-black text-[10px] font-black tracking-widest uppercase rounded-sm shadow-lg">
              {{ item.category }}
            </span>
          </div>
        </div>

        <!-- Content -->
        <div class="p-8">
          <div class="flex items-center gap-2 text-gray-500 text-xs font-semibold tracking-wider mb-4">
            <lucide-icon name="calendar" class="w-4 h-4"></lucide-icon>
            {{ item.formatted_date || item.news_date }}
          </div>
          
          <h3 class="text-xl font-black text-black mb-4 leading-tight tracking-wide group-hover:text-beeses-gold transition-colors duration-300">
            {{ item.title }}
          </h3>
          
          <p class="text-gray-600 text-sm leading-relaxed mb-8 line-clamp-3">
            {{ item.summary }}
          </p>
          
          <!-- Read More Link -->
          <div class="flex items-center gap-2 text-beeses-gold text-xs font-black tracking-widest uppercase group/link">
            <span>DEVAMINI OKU</span>
            <lucide-icon name="arrow-right" class="w-4 h-4 transform group-hover/link:translate-x-2 transition-transform duration-300"></lucide-icon>
          </div>
        </div>

        <!-- Hover Glow Effect -->
        <div class="absolute inset-0 shadow-[inset_0_0_50px_rgba(212,175,55,0)] group-hover:shadow-[inset_0_0_50px_rgba(212,175,55,0.05)] transition-shadow duration-500 pointer-events-none"></div>
      </div>
    </div>
    
    <!-- View All Button -->
    <div class="text-center mt-16">
      <a routerLink="/corporate/components/news" class="inline-block px-8 py-4 bg-transparent border-2 border-black text-black text-xs font-black tracking-[0.2em] uppercase rounded-sm hover:bg-black hover:text-white transition-all duration-300 shadow-sm hover:shadow-xl cursor-pointer">
        TÜM HABERLERİ GÖR
      </a>
    </div>
  </div>
</section>
