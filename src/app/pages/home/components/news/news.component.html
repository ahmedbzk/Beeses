<section class="py-24 bg-[#F8F9FA] relative overflow-hidden" 
         (mouseenter)="isHovered = true" 
         (mouseleave)="isHovered = false">
  <!-- Arka Plan Efektleri -->
  <div class="absolute inset-0 z-0">
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-beeses-gold/10 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-beeses-gold/5 blur-[150px] rounded-full pointer-events-none"></div>
  </div>

  <div class="container mx-auto px-4 md:px-12 relative z-10">
    <!-- Section Header -->
    <div class="text-center mb-16">
      <h4 class="text-beeses-gold text-sm font-bold tracking-[0.3em] uppercase mb-4">Gelişmeler</h4>
      <h2 class="text-4xl md:text-5xl font-black text-black tracking-widest uppercase">HABERLER <span class="text-beeses-gold">&</span> DUYURULAR</h2>
      <div class="w-24 h-1 bg-beeses-gold mx-auto mt-6 rounded-full"></div>
    </div>

    <!-- Carousel Slider Wrapper Container -->
    <div class="relative w-full px-0 lg:px-6 mb-12">
      
      <!-- Carousel Slider (hidden overflow viewport) -->
      <div class="overflow-hidden w-full px-1">
        <div class="flex transition-transform duration-700 ease-in-out py-4" 
             [style.transform]="'translateX(' + (-activeIdx * (100 / itemsPerPage)) + '%)'">
          
          <div *ngFor="let item of displayItems; let i = index" 
               [class]="itemsPerPage === 3 ? 'w-1/3 shrink-0 px-4' : (itemsPerPage === 2 ? 'w-1/2 shrink-0 px-4' : 'w-full shrink-0 px-4')">
            
            <!-- Card Container -->
            <div [routerLink]="['/corporate/components/news', item.id]"
                 class="group relative bg-white border border-gray-200 rounded-2xl overflow-hidden hover:border-beeses-gold/50 transition-all duration-500 hover:-translate-y-2 cursor-pointer shadow-lg hover:shadow-2xl h-full flex flex-col">
              
              <!-- Expanding Gold Top Bar micro-interaction -->
              <div class="h-[3px] w-0 bg-beeses-gold group-hover:w-full transition-all duration-500 absolute top-0 left-0 z-20"></div>

              <!-- Image Container -->
              <div class="relative h-64 overflow-hidden shrink-0">
                <div class="absolute inset-0 bg-black/40 group-hover:bg-transparent transition-colors duration-500 z-10"></div>
                <img [src]="getImageUrl(item.image)" [alt]="item.title" 
                     class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-in-out">
                
                <!-- Category Badge -->
                <div class="absolute top-4 left-4 z-20">
                  <span class="px-4 py-1.5 bg-beeses-gold text-black text-[10px] font-black tracking-widest uppercase rounded-sm shadow-lg">
                    {{ item.category }}
                  </span>
                </div>
              </div>

              <!-- Content -->
              <div class="p-8 flex flex-col flex-grow bg-white">
                <div class="flex items-center gap-2 text-gray-500 text-xs font-semibold tracking-wider mb-4">
                  <lucide-icon name="calendar" class="w-4 h-4"></lucide-icon>
                  {{ item.formatted_date || item.news_date }}
                </div>
                
                <h3 class="text-xl font-black text-black mb-4 leading-tight tracking-wide group-hover:text-beeses-gold transition-colors duration-300 line-clamp-2">
                  {{ item.title }}
                </h3>
                
                <p class="text-gray-600 text-sm leading-relaxed mb-8 line-clamp-3 flex-grow">
                  {{ item.summary }}
                </p>
                
                <!-- Read More Link -->
                <div class="flex items-center gap-2 text-beeses-gold text-xs font-black tracking-widest uppercase group/link mt-auto">
                  <span>DEVAMINI OKU</span>
                  <lucide-icon name="arrow-right" class="w-4 h-4 transform group-hover/link:translate-x-2 transition-transform duration-300"></lucide-icon>
                </div>
              </div>

              <!-- Hover Glow Effect -->
              <div class="absolute inset-0 shadow-[inset_0_0_50px_rgba(212,175,55,0)] group-hover:shadow-[inset_0_0_50px_rgba(212,175,55,0.05)] transition-shadow duration-500 pointer-events-none"></div>
            </div>
            
          </div>
          
        </div>
      </div>

      <!-- Left Arrow Button -->
      <button *ngIf="newsItems.length > 0" (click)="prevSlide()" 
              class="absolute left-0 top-1/2 -translate-y-1/2 z-30 w-12 h-12 bg-white/95 hover:bg-beeses-gold text-beeses-dark hover:text-white rounded-full flex items-center justify-center shadow-xl hover:shadow-2xl transition-all duration-300 border border-gray-200/50 backdrop-blur-sm cursor-pointer hover:scale-105 ml-2 lg:-ml-6 outline-none">
        <lucide-icon name="chevron-left" class="w-6 h-6"></lucide-icon>
      </button>

      <!-- Right Arrow Button -->
      <button *ngIf="newsItems.length > 0" (click)="nextSlide()" 
              class="absolute right-0 top-1/2 -translate-y-1/2 z-30 w-12 h-12 bg-white/95 hover:bg-beeses-gold text-beeses-dark hover:text-white rounded-full flex items-center justify-center shadow-xl hover:shadow-2xl transition-all duration-300 border border-gray-200/50 backdrop-blur-sm cursor-pointer hover:scale-105 mr-2 lg:-mr-6 outline-none">
        <lucide-icon name="chevron-right" class="w-6 h-6"></lucide-icon>
      </button>
      
    </div>

    <!-- Dot Indicators (Up to 6) -->
    <div class="flex justify-center items-center gap-3.5 mb-12" *ngIf="newsItems.length > 0">
      <button *ngFor="let item of newsItems.slice(0, 6); let idx = index" 
              (click)="selectSlide(idx)" 
              [class]="activeIdx === idx ? 'bg-beeses-gold shadow-[0_0_12px_#c5a86a] scale-125 w-4 h-4' : 'bg-gray-300 hover:bg-gray-400 w-2.5 h-2.5'"
              class="rounded-full transition-all duration-300 cursor-pointer outline-none border-none"
              [title]="item.title">
      </button>
    </div>
    
    <!-- View All Button -->
    <div class="text-center">
      <a routerLink="/corporate/components/news" class="inline-block px-8 py-4 bg-transparent border-2 border-black text-black text-xs font-black tracking-[0.2em] uppercase rounded-sm hover:bg-black hover:text-white transition-all duration-300 shadow-sm hover:shadow-xl cursor-pointer">
        TÜM HABERLERİ GÖR
      </a>
    </div>
  </div>
</section>
