<!-- Hero Section -->
<section class="relative w-full h-[60vh] min-h-[500px] flex items-center justify-center overflow-hidden bg-beeses-dark">
  <div class="absolute inset-0 w-full h-full">
    <img src="assets/backgrounds/bg1.jpg" class="w-full h-full object-cover opacity-60" />
    <!-- Gradient fading into beeses-silver at the very bottom -->
    <div class="absolute inset-0 bg-gradient-to-b from-beeses-dark/80 via-beeses-dark/50 to-beeses-silver"></div>
  </div>
  
  <div class="relative z-10 text-center px-4 max-w-4xl mx-auto pt-20">
    <span class="text-beeses-gold text-[11px] md:text-sm tracking-[0.5em] font-bold uppercase mb-6 block drop-shadow-md">Arkadan Gelen Güç</span>
    <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold text-white mb-6 tracking-tight drop-shadow-2xl break-words">EKİBİMİZ</h1>
    <div class="w-24 h-1 bg-beeses-gold mx-auto rounded-full mb-8 shadow-[0_0_15px_rgba(181,129,49,0.5)]"></div>
    <p class="text-lg md:text-2xl text-beeses-dark font-medium leading-relaxed max-w-2xl mx-auto drop-shadow-lg">
      Sesi bir sanat formuna dönüştüren tutkulu uzmanlarımız.
    </p>
  </div>
</section>

<!-- Team Section -->
<section class="w-full bg-beeses-silver py-20 md:py-32 relative">
  <div class="container mx-auto px-6 md:px-12 max-w-7xl">
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      
      <!-- Team Card -->
      <div *ngFor="let member of team" class="group relative overflow-hidden rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.08)] bg-white transition-all duration-500 hover:-translate-y-2">
        
        <!-- Image Container -->
        <div class="relative w-full aspect-[4/5] overflow-hidden bg-gray-200">
          <img [src]="member.image" [alt]="member.name" class="w-full h-full object-cover object-top transition-transform duration-700 group-hover:scale-105 filter grayscale-[20%] group-hover:grayscale-0">
          
          <!-- Hover Overlay Gradient -->
          <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
          
          <!-- Social Icons (Appear on hover) -->
          <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-4 opacity-0 translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-500 delay-100">
            <a *ngFor="let social of member.socials" [href]="social.link" class="w-10 h-10 rounded-full bg-beeses-gold text-white flex items-center justify-center hover:bg-white hover:text-beeses-gold transition-colors shadow-lg">
              <lucide-icon [name]="social.icon" class="w-4 h-4"></lucide-icon>
            </a>
          </div>
        </div>

        <!-- Content -->
        <div class="p-6 text-center border-t border-gray-100 relative z-10 bg-white">
          <h3 class="text-xl font-bold text-beeses-dark mb-1 transition-colors group-hover:text-beeses-gold">{{ member.name }}</h3>
          <p class="text-xs tracking-widest text-gray-500 uppercase font-medium">{{ member.role }}</p>
        </div>
        
      </div>

    </div>
  </div>
</section>
