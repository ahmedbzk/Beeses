<section class="relative w-full h-auto md:h-[40vh] min-h-[350px] md:min-h-[400px] flex items-start justify-center overflow-hidden bg-beeses-silver border-none">
  <div class="absolute inset-0 w-full h-full">
    <img src="assets/backgrounds/bg1.jpg" class="w-full h-full object-cover opacity-60" />
    <div class="absolute inset-0 bg-gradient-to-b from-beeses-dark/95 via-beeses-dark/70 to-beeses-silver"></div>
  </div>
  
  <div class="relative z-10 text-center px-4 max-w-4xl mx-auto pt-32 md:pt-40 pb-6 md:pb-12">
    <span class="text-beeses-gold text-[10px] md:text-sm tracking-[0.5em] font-bold uppercase mb-4 md:mb-6 block drop-shadow-md">Merak Ettikleriniz</span>
    <h1 class="text-3xl sm:text-4xl md:text-6xl lg:text-7xl font-bold text-white mb-6 tracking-tight drop-shadow-2xl break-words">S.S.S.</h1>
    <div class="w-20 md:w-24 h-1 bg-beeses-gold mx-auto rounded-full mb-8 shadow-[0_0_15px_rgba(181,129,49,0.5)]"></div>
    <p class="text-base md:text-xl text-beeses-dark font-medium leading-relaxed max-w-2xl mx-auto drop-shadow-lg">
      Sıkça Sorulan Sorular ve Cevapları
    </p>
  </div>
</section>

<!-- FAQ Accordion Section -->
<section class="w-full bg-beeses-silver py-20 md:py-32 relative min-h-screen -mt-px">
  <div class="container mx-auto px-6 md:px-12 max-w-6xl">
    
    <!-- Changed to 2 columns grid with items-start -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 relative z-10 items-start">
      <!-- Accordion Item -->
      <div *ngFor="let faq of faqs; let i = index" 
           class="bg-white rounded-xl shadow-[0_5px_20px_rgba(0,0,0,0.03)] border border-gray-100 overflow-hidden transition-all duration-300 w-full"
           [ngClass]="{'ring-1 ring-beeses-gold/30 shadow-[0_10px_30px_rgba(181,129,49,0.1)] -translate-y-1': faq.isOpen}">
        
        <button (click)="toggleFaq(i)" 
                class="w-full text-left px-6 py-5 flex items-center justify-between gap-4 focus:outline-none bg-transparent transition-colors hover:bg-gray-50/50 cursor-pointer">
          <h4 class="text-base font-semibold transition-colors leading-relaxed"
              [ngClass]="faq.isOpen ? 'text-beeses-gold' : 'text-beeses-dark'">
            {{ faq.question }}
          </h4>
          <div class="w-8 h-8 shrink-0 rounded-full flex items-center justify-center transition-colors"
               [ngClass]="faq.isOpen ? 'bg-beeses-gold/10 text-beeses-gold' : 'bg-gray-100 text-gray-500'">
            <lucide-icon [name]="faq.isOpen ? 'chevron-up' : 'chevron-down'" class="w-4 h-4 transition-transform duration-300"></lucide-icon>
          </div>
        </button>

        <!-- Answer Panel -->
        <div class="px-6 overflow-hidden transition-all duration-300 ease-in-out"
             [ngStyle]="{'max-height': faq.isOpen ? '500px' : '0px', 'opacity': faq.isOpen ? '1' : '0'}">
          <div class="pb-6 pt-1">
            <div class="w-full h-[1px] bg-gray-100 mb-4"></div>
            <p class="text-gray-600 leading-relaxed text-[15px] font-light text-justify">
              {{ faq.answer }}
            </p>
          </div>
        </div>

      </div>
    </div>

    <!-- Contact Prompt -->
    <div class="mt-24 text-center">
      <h3 class="text-2xl md:text-3xl font-light text-beeses-dark mb-8">Aradığınız cevabı bulamadınız mı?</h3>
      <a routerLink="/contact" class="inline-flex items-center gap-3 px-8 py-4 bg-beeses-dark text-white rounded-full font-bold tracking-widest text-xs md:text-sm uppercase hover:bg-beeses-gold transition-colors duration-300 shadow-xl hover:shadow-beeses-gold/30 hover:-translate-y-1 transform">
        BİZİMLE İLETİŞİME GEÇİN
        <lucide-icon name="arrow-right" class="w-4 h-4"></lucide-icon>
      </a>
    </div>

  </div>
</section>
